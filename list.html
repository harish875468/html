<html>
<head>
<title>list</title>
</head>
<body>
<h1 style="color:green">list types</h1>
<h2 style="color:red">html ordered list tag</h2>
<p>html stands for hypertext markup language</p><br>
<h1>ORDERED LIST</h1>
<ol>
<li>keyboard</li>
<li>mouse</li>
<li>light pen</li>
<li>joystick</li>
</ol>
<h2>UNORDERED LIST</h2>
<ul>
<li>moniter</li>
<li>speaker</li>
<li>printer</li>
</ul>
<h2>DEFINITION LIST</li>
<dl>
<dt>keyboard</dt>
<dd>input device</dd>
<dt>printer</dt>
<dd>output device</dd>
</dl>
</body>
</html>
