<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullstack Developer | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #8e44ad; /* Your Violet Background */
            color: #333;
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: 500; }

        /* Hero Section */
        .hero-container {
            display: flex;
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .image-section { flex: 1; background: #f4f4f4; }
        .image-section img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .text-section { flex: 1.2; padding: 40px; }
        .badge { background: #8e44ad; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .pill { display: inline-block; background: #f1f2f6; padding: 6px 12px; margin: 4px; border-radius: 5px; font-size: 0.85rem; color: #8e44ad; font-weight: bold; }

        /* Contact Form Section */
        .contact-section {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15); /* Glass effect */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
        }

        .contact-section h2 { text-align: center; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: white;
            box-sizing: border-box; /* Prevents padding from breaking width */
            font-family: inherit;
        }

        .form-group textarea { height: 120px; resize: vertical; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2d3436;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .submit-btn:hover { background: #000; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .hero-container { flex-direction: column; margin: 20px; }
            .contact-section { margin: 20px; padding: 25px; }
        }
    </style>
</head>
<body>

    <nav>
        <div style="color: white; font-weight: bold; font-size: 1.2rem;">DevPortfolio</div>
        <div>
            <a href="#">About</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <div class="hero-container">
        <div class="image-section">
            <img src="WhatsApp Image 2026-03-20 at 12.16.17 PM.jpeg" alt="Fullstack Developer">
        </div>
        <div class="text-section">
            <span class="badge">Open to Projects</span>
            <h1>Fullstack Developer</h1>
            <p>I build robust applications with a focus on clean architecture and modern UI/UX.</p>
            <div class="tech-stack">
                <div class="pill">TypeScript</div>
                <div class="pill">Next.js</div>
                <div class="pill">PostgreSQL</div>
                <div class="pill">Docker</div>
            </div>
            <a href="#contact" style="display:inline-block; margin-top: 25px; padding: 12px 25px; background: #8e44ad; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">Let's Talk</a>
        </div>
    </div>

    <div id="contact" class="contact-section">
        <h2>Send Me a Message</h2>
        <form action="#" onsubmit="alert('Thanks for reaching out! (Form simulation)'); return false;">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea placeholder="Tell me about your project..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
  </div>
  </body>
</html>
