<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullstack Developer | Portfolio</title>
    <style>
        /* General Setup */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
        }

        /* Navigation Bar */
        nav {
            background: #2d3436;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }

        /* Main Container */
        .hero-container {
            display: flex;
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Left Side: Professional Image */
        .image-section {
            flex: 1;
            background: #dfe6e9;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Right Side: Professional Info */
        .text-section {
            flex: 1.2;
            padding: 50px;
        }

        .badge {
            background: #0984e3;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { margin: 15px 0 10px 0; font-size: 2.5rem; }
        
        p { line-height: 1.6; color: #636e72; }

        /* Tech Stack Pills */
        .tech-stack {
            margin-top: 25px;
        }

        .pill {
            display: inline-block;
            background: #f1f2f6;
            padding: 6px 15px;
            margin: 5px 5px 5px 0;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #2d3436;
            border: 1px solid #dfe6e9;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero-container { flex-direction: column; margin: 20px; }
            nav { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: bold; font-size: 1.2rem;">DevPortfolio</div>
        <div>
            <a href="#">About</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <div class="hero-container">
        <div class="image-section">
            <img src="WhatsApp Image 2026-03-20 at 12.16.17 PM.jpeg" alt="Fullstack Developer Workspace">
        </div>

        <div class="text-section">
            <span class="badge">Available for Hire</span>
            <h1>Fullstack Developer</h1>
            <p>I build scalable web applications from the database to the browser. I specialize in creating clean, efficient code and user-centric designs.</p>
            
            <div class="tech-stack">
                <div class="pill">React</div>
                <div class="pill">Node.js</div>
                <div class="pill">Python</div>
                <div class="pill">PostgreSQL</div>
                <div class="pill">AWS</div>
            </div>

            <button style="margin-top: 30px; padding: 12px 25px; background: #2d3436; color: white; border: none; border-radius: 5px; cursor: pointer;">
                View My Work
            </button>
        </div>
    </div>

</body>
</html>
